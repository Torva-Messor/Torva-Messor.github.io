<!DOCTYPE html>
<html>
<head>
    <meta charset="utf-8" />
    <title>WebXR Shared AR Room</title>
    
    <script src="https://aframe.io/releases/1.4.2/aframe.min.js"></script>
    <script src="https://cdn.pubnub.com/sdk/javascript/pubnub.7.2.2.min.js"></script>

    <link rel="stylesheet" href="style.css">
</head>

<body>
    <div id="ui-container">
        <button id="color-btn">Change Color Everywhere!</button>
    </div>

    <a-scene webxr="optionalFeatures: dom-overlay; overlayElement: #ui-container;">
        
        <a-box id="shared-cube" position="0 0 -1" scale="0.3 0.3 0.3" color="#4CC3D9"
               animation="property: rotation; to: 0 360 0; loop: true; dur: 5000">
        </a-box>

    </a-scene>

    <script src="app.js"></script>
</body>
</html>
