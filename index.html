<!DOCTYPE html>
<html>
<head>
    <meta charset="utf-8" />
    <title>Shared AR Space</title>
    <script src="https://aframe.io/releases/1.4.2/aframe.min.js"></script>
    <script src="https://cdn.pubnub.com/sdk/javascript/pubnub.7.2.2.min.js"></script>
    
    <script src="config.js"></script>
    <link rel="stylesheet" href="style.css">
</head>

<body>
    <div id="overlay">
        <div class="modal">
            <h1>Shared AR Room</h1>
            <p>Scan the QR code, then tap the button below to sync the 3D space.</p>
            <button id="start-ar">Enter Shared AR</button>
        </div>
    </div>

    <div id="ui-container" style="display: none;">
        <button id="color-btn">Sync New Color</button>
    </div>

    <a-scene webxr="optionalFeatures: dom-overlay; overlayElement: #ui-container;">
        <a-box id="shared-cube" position="0 0 -1" scale="0.3 0.3 0.3" color="#4CC3D9"></a-box>
        <a-entity camera position="0 1.6 0"></a-entity>
    </a-scene>

    <script src="app.js"></script>
</body>
</html>
